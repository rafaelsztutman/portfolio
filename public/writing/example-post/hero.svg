<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#262626" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <text x="40" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#737373">// example-post</text>
  <text x="40" y="330" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="38" font-weight="500" fill="#fafafa">Example Post</text>
  <text x="40" y="365" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#a3a3a3">Placeholder hero</text>
</svg>
